<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Praxis Learning &amp; Consulting</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #e8f4fb;
    color: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border: 1.5px solid rgba(26,111,168,0.2);
    border-radius: 18px;
    padding: 3rem 2.5rem;
    max-width: 480px;
    box-shadow: 0 4px 24px rgba(26,111,168,0.1);
  }
  .icon { font-size: 48px; margin-bottom: 1rem; }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: 1rem;
  }
  p { font-size: 15px; line-height: 1.7; color: #1a1a1a; margin-bottom: 1.5rem; font-weight: 300; }
  a.btn {
    display: inline-block;
    background: #1a6fa8;
    color: #fff;
    padding: 12px 28px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Thank You</h1>
    <p>Your message has been received. A member of the Praxis Learning &amp; Consulting team will be in touch with you shortly.</p>
    <a class="btn" href="/">Return to Homepage</a>
  </div>
</body>
</html>
